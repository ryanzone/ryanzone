name: Generate Red 3D Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        with:
          username: ryanzone
          theme: github-night
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert colors to red
        run: |
          FILE="dist/profile-night.svg"

          # Replace common GitHub green shades
          sed -i 's/#9be9a8/#ff9999/g' $FILE
          sed -i 's/#40c463/#ff4d4d/g' $FILE
          sed -i 's/#30a14e/#cc0000/g' $FILE
          sed -i 's/#216e39/#800000/g' $FILE

          # Replace night theme blues if present
          sed -i 's/#79c0ff/#ff6666/g' $FILE
          sed -i 's/#58a6ff/#ff3333/g' $FILE
          sed -i 's/#1f6feb/#b30000/g' $FILE

      - name: Move file
        run: |
          mkdir -p profile-3d-contrib
          mv dist/profile-night.svg profile-3d-contrib/profile-red.svg

      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "update red 3d graph" || echo "no changes"
          git push
