name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Move generated files
        run: |
          mkdir -p profile-3d-contrib
          ls -la profile-3d-contrib/ || true
          cp profile-3d-contrib/profile-night-red.svg profile-3d-contrib/profile-night-red.svg 2>/dev/null || true
          ls -la profile-3d-contrib/

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update 3d contribution graph" || echo "no changes"
          git push
